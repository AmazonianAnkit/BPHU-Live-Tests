<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPHU Laboratory Test Availability Status</title>
    <style>
        :root {
            --available: #10B981;
            --unavailable: #EF4444;
            --bg-dark: #0F172A;
            --card-bg: #1E293B;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #F8FAFC;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* Optimized to fit perfectly on a TV screen without scrolling */
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #334155;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 { margin: 0; font-size: 2.2rem; color: #38BDF8; }
        .header h2 { margin: 5px 0 0 0; font-size: 1.4rem; color: #94A3B8; }
        .timestamp { font-size: 1.2rem; font-weight: bold; background: #334155; padding: 10px 15px; border-radius: 8px; }
        
        /* 3-Column Grid for high density layout on large TV screens */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            height: 82vh;
        }
        .test-card {
            background-color: var(--card-bg);
            padding: 14px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid #64748B;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .test-name { font-size: 1.15rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 75%; }
        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        .status-AVAILABLE { border-left-color: var(--available); }
        .status-AVAILABLE .badge { background-color: rgba(16, 185, 129, 0.2); color: #34D399; }
        
        .status-NOT { border-left-color: var(--unavailable); animation: pulse 2s infinite; }
        .status-NOT .badge { background-color: rgba(239, 68, 68, 0.2); color: #F87171; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 id="facility-title">BPHU LABORATORY STATUS</h1>
            <h2>National Health Mission - Uttar Pradesh</h2>
        </div>
        <div class="timestamp" id="live-clock">Loading Today's Date...</div>
    </div>

    <div class="grid" id="dashboard-grid">
        <!-- The 73 tests will automatically inject here dynamically -->
    </div>

    <script>
        // ⚠️ PASTE YOUR COPIED GOOGLE APPS SCRIPT WEB APP URL HERE:
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbyvVZsw4Y-b3xgkS5cT1igGI9qToj97FSc40dP93DORQJ5bw4agTNvwU2Nlyh0oZa1xUQ/exec";

        // Read the unique location from the browser URL bar (?facilityId=Chinhat)
        const urlParams = new URLSearchParams(window.location.search);
        const facilityId = urlParams.get('facilityId') || "Chinhat";
        
        document.getElementById('facility-title').innerText = `BPHU LAB STATUS: CHC ${facilityId.toUpperCase()}`;

        async function fetchStatus() {
            try {
                const response = await fetch(`${BASE_API_URL}?facilityId=${encodeURIComponent(facilityId)}`);
                const data = await response.json();
                
                const grid = document.getElementById('dashboard-grid');
                grid.innerHTML = ""; // Clear loader
                
                data.forEach(test => {
                    const card = document.createElement('div');
                    // Handle status string grouping checks cleanly
                    const isAvailable = test.status === "AVAILABLE";
                    card.className = `test-card ${isAvailable ? 'status-AVAILABLE' : 'status-NOT'}`;
                    
                    card.innerHTML = `
                        <div class="test-name">${test.testName}</div>
                        <div class="badge">${isAvailable ? 'AVAILABLE' : 'NO STOCK'}</div>
                    `;
                    grid.appendChild(card);
                });
                
                if(data.length > 0) {
                    document.getElementById('live-clock').innerText = `Last Updated: ${data[0].updatedAt}`;
                }
            } catch (error) {
                console.error("Data stream failed:", error);
                document.getElementById('live-clock').innerText = "⚠️ Connection Reconnecting...";
            }
        }

        // Run fetch on mount and auto-refresh every 2 minutes for constant live synchronization
        fetchStatus();
        setInterval(fetchStatus, 120000);
    </script>
</body>
</html>
