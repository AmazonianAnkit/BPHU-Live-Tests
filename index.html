<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPHU Daily Lab Operational Status</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto mb-8 bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Block Public Health Unit (BPHU)</h1>
                <p class="text-sm text-slate-500">Live Diagnostics Diagnostics & Equipment Availability Monitoring</p>
            </div>
            
            <div class="w-full md:w-72">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Select Lab Location</label>
                <select id="facilitySelect" onchange="fetchStatus()" class="w-full bg-slate-50 border border-slate-200 text-slate-700 py-2.5 px-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all">
                    <option value="chcbakshikatalab">CHC Bakshi-Ka-Talab</option>
                    <option value="gosaiganj">CHC Gosaiganj</option>
                    <option value="kakori">CHC Kakori</option>
                    <option value="sarojininagar">CHC Sarojininagar</option>
                    <option value="chinhat">CHC Chinhat</option>
                    <option value="malihabad">CHC Malihabad</option>
                    <option value="mohanlalganj">CHC Mohanlalganj</option>
                    <option value="mall">CHC Mall</option>
                </select>
            </div>
        </div>

        <hr class="my-5 border-slate-100">

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-emerald-50/60 border border-emerald-100 p-4 rounded-xl">
                <span class="block text-xs font-medium text-emerald-600 uppercase tracking-wider">Operational</span>
                <span id="activeCount" class="text-3xl font-bold text-emerald-700">73</span><span class="text-sm text-emerald-600 font-medium">/73</span>
            </div>
            <div class="bg-rose-50/60 border border-rose-100 p-4 rounded-xl">
                <span class="block text-xs font-medium text-rose-600 uppercase tracking-wider">Downtime</span>
                <span id="downCount" class="text-3xl font-bold text-rose-700">0</span>
            </div>
            <div class="bg-blue-50/60 border border-blue-100 p-4 rounded-xl col-span-2">
                <span class="block text-xs font-medium text-blue-600 uppercase tracking-wider">System Status</span>
                <span id="overallStatus" class="text-lg font-semibold text-blue-800 block mt-1">✨ All Systems Functional</span>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <div id="departmentsGrid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        // Paste your exact macro execution URL here
        const API_BASE_URL = "https://script.google.com/macros/s/AKfycbyHIIwbmvHxZo5Ssw4zTSCsTKS1B5rGH5LicNgnRKWhHIy5q2JzwdwBOlceqcnxdmigTg/exec";

        // Categorized Test Mapping for clean compartmentalized UI
        const DEPARTMENTS = {
            "Hematology & Blood Studies": [
                "Hemoglobin", "Total leucocyte count", "Differential leucocyte count", "Platelet count", 
                "Complete blood count", "Erythrocyte sedimentation rate (ESR)", "Blood group and Rh typing, cross matching", 
                "Peripheral blood film", "Reticulocyte count", "Absolute eosinophil count", "Bleeding time and clotting time", 
                "Sickle cell screening test", "Sickle cell strip test", "Thalassemia screening", "DCT for Hb electrophoresis", 
                "G6PD enzyme deficiency test", "MP slide method", "Malaria rapid test", "Prothrombin Time (PT) and INR", 
                "Activated partial thromboplastin time (APTT)"
            ],
            "Biochemistry Profiles": [
                "Blood sugar", "Glucose tolerance test (GTT)", "Total bilirubin", "Direct & indirect bilirubin", 
                "Serum creatinine", "Blood urea", "SGPT", "SGOT", "Alkaline phosphatase", "Total protein", 
                "Albumin & A/G ratio", "Globulin", "Total cholesterol", "Triglycerides", "VLDL", "HDL", "LDL", 
                "Uric acid", "HbA1c", "Serum calcium", "Amylase", "Iron", "TIBC", "LDH"
            ],
            "Serology & Clinical Pathology": [
                "Dengue test", "RPR/VDRL test", "HIV test", "HBsAg test", "HCV test", "Sputum for AFB", 
                "Typhoid test (IgM)", "Troponin I", "CRP (Quantitative)", "CBNAAT", "Rapid test for cholera", 
                "K39 for Kala Azar", "Filaria test", "TB Mantoux"
            ],
            "Urine, Stool & Fluids Analysis": [
                "HCG urine test", "Urine routine test", "Urine microscopy", "Urine for microalbumin", 
                "Urine for creatinine and ACR", "Stool for ova and cyst", "Stool for occult blood", 
                "Wet mount & Gram stain", "Gram staining", "VIA test", "Pap smear", "CSF analysis", 
                "Fluid analysis", "24 hr urinary protein", "Drug overdose test"
            ]
        };

        async function fetchStatus() {
            const facility = document.getElementById("facilitySelect").value;
            const grid = document.getElementById("departmentsGrid");
            grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 font-medium animate-pulse">Syncing real-time diagnostics parameters...</div>`;

            try {
                const response = await fetch(`${API_BASE_URL}?facilityId=${facility}`);
                const downtimeData = await response.json();
                
                let totalActive = 73;
                let totalDown = 0;
                grid.innerHTML = "";

                // Generate cards categorized by department blocks
                for (const [deptName, tests] of Object.entries(DEPARTMENTS)) {
                    let deptHtml = `
                        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs">
                            <h3 class="text-base font-bold text-slate-800 mb-4 pb-2 border-b border-slate-100 flex justify-between items-center">
                                ${deptName}
                                <span class="text-xs bg-slate-100 text-slate-500 font-semibold px-2 py-0.5 rounded-full">${tests.length} Tests</span>
                            </h3>
                            <div class="space-y-2.5 max-h-96 overflow-y-auto pr-1">
                    `;

                    tests.forEach(test => {
                        const isDown = downtimeData[test];
                        if (isDown) {
                            totalActive--;
                            totalDown++;
                            deptHtml += `
                                <div class="flex items-start justify-between p-3 bg-rose-50/50 border border-rose-100 rounded-xl transition-all">
                                    <div class="pr-2">
                                        <p class="text-xs font-semibold text-slate-800">${test}</p>
                                        <p class="text-[11px] text-rose-600 mt-0.5 font-medium">⚠️ ${isDown.reasonEn} (${isDown.reasonHi})</p>
                                    </div>
                                    <span class="text-[10px] font-bold bg-rose-600 text-white px-2 py-0.5 rounded-md uppercase tracking-wider whitespace-nowrap">SUSPENDED</span>
                                </div>
                            `;
                        } else {
                            deptHtml += `
                                <div class="flex items-center justify-between p-3 bg-slate-50/50 border border-slate-100 rounded-xl hover:bg-slate-50 transition-all">
                                    <span class="text-xs font-medium text-slate-600">${test}</span>
                                    <span class="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-md uppercase tracking-wider">ONLINE</span>
                                </div>
                            `;
                        }
                    });

                    deptHtml += `</div></div>`;
                    grid.innerHTML += deptHtml;
                }

                // Update counters at top
                document.getElementById("activeCount").innerText = totalActive;
                document.getElementById("downCount").innerText = totalDown;
                
                const statusBox = document.getElementById("overallStatus");
                if (totalDown > 0) {
                    statusBox.innerHTML = `⚠️ Attention Required: ${totalDown} Service Outages Flagged`;
                    statusBox.className = "text-lg font-semibold text-rose-800 block mt-1";
                } else {
                    statusBox.innerHTML = "✨ All Systems Functional";
                    statusBox.className = "text-lg font-semibold text-emerald-800 block mt-1";
                }

            } catch (error) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-rose-500 font-semibold">⚠️ Connection Timeout. Verify Google Deployment URL configuration parameters.</div>`;
            }
        }

        // Run automatically when the app initializes
        window.onload = fetchStatus;
    </script>
</body>
</html>
