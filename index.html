<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPHU Lab Status Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <header class="bg-blue-900 text-white shadow-md p-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold tracking-wide"><i class="fa-solid fa-square-poll-vertical mr-2"></i> District Lab Monitoring Portal</h1>
            
            <select id="facilitySelector" onchange="fetchLabStatus()" class="bg-white text-slate-900 px-4 py-2 rounded-md font-medium shadow focus:outline-none focus:ring-2 focus:ring-blue-400">
                <option value="">-- Select Lab Location --</option>
                <option value="Bakshi-Ka-Talab">CHC Bakshi-Ka-Talab</option>
                <option value="Gosainganj">CHC Gosainganj</option>
                <option value="Kakori">CHC Kakori</option>
                <option value="Sarojininagar">CHC Sarojininagar</option>
                <option value="Chinhat">CHC Chinhat</option>
                <option value="Malihabad">CHC Malihabad</option>
                <option value="Mohanlalganj">CHC Mohanlalganj</option>
                <option value="Mall">CHC Mall</option>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 sm:p-6">
        
        <div id="welcomeMessage" class="text-center py-16 bg-white rounded-xl shadow-sm border border-slate-200 my-6">
            <i class="fa-solid fa-microscope text-6xl text-slate-300 mb-4"></i>
            <h2 class="text-2xl font-semibold text-slate-600">Please select a BPHU Lab Location to view live metrics.</h2>
        </div>

        <div id="dashboardContent" class="hidden animate-fade-in">
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-600">
                    <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">Total Sanctioned</p>
                    <h3 class="text-3xl font-black mt-1">73</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-emerald-500">
                    <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">Operational / Live</p>
                    <h3 id="metricLive" class="text-3xl font-black text-emerald-600 mt-1">73</h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-rose-500">
                    <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">Downtime / Suspended</p>
                    <h3 id="metricDown" class="text-3xl font-black text-rose-600 mt-1">0</h3>
                </div>
            </div>

            <div id="testCardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </div>
    </main>

    <script>
        // PASTE YOUR GOOGLE WEB APP DEPLOYMENT URL HERE EVERY TIME YOU REDEPLOY
        const API_BASE_URL = "https://script.google.com/macros/s/AKfycbyxuqg0zp9iid3JZPR3Nggy5REwi8NokDDCMMWbyYL6R6r6w2eUZmNkoX9Mx8c2VKrm6g/exec";

        // Master Checklist Array of 73 elements exactly matching Form/Script structures
        const MASTER_TESTS = [
            "Hemoglobin", "Total leucocyte count", "Differential leucocyte count", "Platelet count", "Complete blood count", "Erythrocyte sedimentation rate (ESR)", "Blood group and Rh typing, cross matching", "Peripheral blood film", "Reticulocyte count", "Absolute eosinophil count", "Bleeding time and clotting time", "Sickle cell screening test", "Sickle cell strip test", "Thalassemia screening", "DCT for Hb electrophoresis", "G6PD enzyme deficiency test", "MP slide method", "Malaria rapid test", "Prothrombin Time (PT) and INR", "Activated partial thromboplastin time (APTT)", "HCG urine test", "Urine routine test", "Urine microscopy", "Urine for microalbumin", "Urine for creatinine and ACR", "Stool for ova and cyst", "Stool for occult blood", "Dengue test", "RPR/VDRL test", "HIV test", "HBsAg test", "HCV test", "Sputum for AFB", "Typhoid test (IgM)", "Blood sugar", "Glucose tolerance test (GTT)", "Total bilirubin", "Direct & indirect bilirubin", "Serum creatinine", "Blood urea", "SGPT", "SGOT", "Alkaline phosphatase", "Total protein", "Albumin & A/G ratio", "Globulin", "Total cholesterol", "Triglycerides", "VLDL", "HDL", "LDL", "Uric acid", "HbA1c", "Serum calcium", "Wet mount & Gram stain", "Gram staining", "VIA test", "K39 for Kala Azar", "Filaria test", "TB Mantoux", "Troponin I", "CRP (Quantitative)", "Pap smear", "CBNAAT", "Rapid test for cholera", "CSF analysis", "Fluid analysis", "Amylase", "Iron", "TIBC", "LDH", "24 hr urinary protein", "Drug overdose test"
        ];

        async function fetchLabStatus() {
            const selector = document.getElementById("facilitySelector");
            const facilityId = selector.value;
            
            const welcome = document.getElementById("welcomeMessage");
            const content = document.getElementById("dashboardContent");
            const container = document.getElementById("testCardsContainer");

            if (!facilityId) {
                welcome.classList.remove("hidden");
                content.classList.add("hidden");
                return;
            }

            welcome.classList.add("hidden");
            content.classList.remove("hidden");
            container.innerHTML = `<div class="col-span-full text-center py-12"><i class="fa-solid fa-spinner fa-spin text-4xl text-blue-900"></i><p class="mt-2 text-slate-500 font-medium">Fetching real-time downtime cache data...</p></div>`;

            try {
                // Fetch current exceptions from Google Deployment Apps Script API
                const response = await fetch(`${API_BASE_URL}?facilityId=${encodeURIComponent(facilityId)}`);
                const exceptionsMap = await response.json();
                
                container.innerHTML = ""; // Wipe loading spinner
                let downCount = 0;

                MASTER_TESTS.forEach(testName => {
                    const isDown = exceptionsMap.hasOwnProperty(testName);
                    
                    let cardHtml = "";
                    if (isDown) {
                        downCount++;
                        const data = exceptionsMap[testName];
                        cardHtml = `
                            <div class="bg-rose-50 border border-rose-200 rounded-xl p-4 shadow-sm flex items-start gap-3">
                                <div class="bg-rose-500 text-white rounded-lg p-2.5 flex items-center justify-center"><i class="fa-solid fa-triangle-exclamation text-lg"></i></div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-slate-900 text-base leading-tight truncate">${testName}</h4>
                                    <p class="text-xs font-semibold text-rose-700 tracking-wide mt-0.5 uppercase"><i class="fa-solid fa-ban mr-1"></i> Not Available / उपलब्ध नहीं</p>
                                    <div class="mt-2 text-xs bg-white border border-rose-100 p-2 rounded text-slate-600 font-medium shadow-2xs">
                                        <p class="text-slate-800 font-bold"><i class="fa-solid fa-circle-info mr-1 text-slate-400"></i> ${data.reasonEn}</p>
                                        <p class="text-slate-500 mt-0.5">${data.reasonHi}</p>
                                    </div>
                                </div>
                            </div>`;
                    } else {
                        cardHtml = `
                            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm flex items-start gap-3 hover:border-slate-300 transition-colors">
                                <div class="bg-emerald-500 text-white rounded-lg p-2.5 flex items-center justify-center"><i class="fa-solid fa-circle-check text-lg"></i></div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-slate-900 text-base leading-tight truncate">${testName}</h4>
                                    <p class="text-xs font-semibold text-emerald-600 tracking-wide mt-0.5 uppercase"><i class="fa-solid fa-check mr-1"></i> Available / उपलब्ध</p>
                                </div>
                            </div>`;
                    }
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });

                // Compute real-time metric counter displays on the top bar cards
                document.getElementById("metricDown").innerText = downCount;
                document.getElementById("metricLive").innerText = (73 - downCount);

            } catch (error) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-rose-600"><i class="fa-solid fa-circle-xmark text-4xl mb-2"></i><p class="font-bold">Failed to load connection endpoint.</p><p class="text-xs text-slate-500">${error.toString()}</p></div>`;
            }
        }
    </script>
</body>
</html>
