<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Lab Test Availability Status Portal - Lucknow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: #333; }
        .dashboard-header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 2.5rem 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .dashboard-header h1 { font-size: 2.2rem; letter-spacing: 0.5px; }
        .dashboard-header .lead { font-size: 1.1rem; opacity: 0.9; }
        
        .control-card { background: white; border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); padding: 1.75rem; margin-top: -2rem; margin-bottom: 2.5rem; }
        .control-card label { font-size: 0.9rem; letter-spacing: 0.3px; margin-bottom: 0.5rem; }
        
        .status-card { background: white; border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); padding: 2.2rem; }
        .status-badge { font-size: 0.9rem; padding: 0.6rem 1.4rem; border-radius: 50px; font-weight: 700; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-updated { background-color: #e8f5e9; color: #1b5e20; }
        .status-pending { background-color: #fff8e1; color: #b78103; animation: pulse 2s infinite; }
        .status-error { background-color: #ffebee; color: #c62828; }
        
        .counter-banner { background: #f0f4f8; border-radius: 12px; font-weight: 600; font-size: 1rem; color: #4a5568; padding: 1rem !important; }
        .counter-banner .badge { font-size: 0.85rem; padding: 0.4rem 0.8rem; border-radius: 6px; }
        
        .dept-header-row { background-color: #e2e8f0 !important; color: #2d3748; font-weight: 700; font-size: 1.05rem; }
        #test-matrix-table th { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 1rem 0.75rem; }
        #test-matrix-table td { padding: 0.9rem 0.75rem; font-size: 0.95rem; }
        .test-name-main { font-size: 1rem; color: #1a202c; }
        .test-row-active { background-color: #ffffff; }
        .test-row-inactive { background-color: #fffbfb; }
        
        .status-tag-text { font-size: 0.78rem; font-weight: 800; display: block; line-height: 1.3; letter-spacing: 0.3px; }
        .reason-text-en { font-size: 0.95rem; color: #c62828; font-weight: 600; }
        .reason-text-hi { font-size: 0.82rem; color: #e53935; font-weight: 500; display: block; margin-top: 0.1rem; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 📱 MOBILE CARD RESPONSIVE VIEW */
        @media screen and (max-width: 768px) {
            #test-matrix-table thead { display: none; }
            #test-matrix-table, #test-matrix-table tbody, #test-matrix-table tr, #test-matrix-table td { display: block; width: 100% !important; }
            
            /* Department Group Header on Mobile */
            .dept-header-row { 
                margin-top: 1.5rem;
                margin-bottom: 0.5rem;
                border-radius: 8px;
                padding: 0.6rem 1rem !important;
                text-align: center !important;
                box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            }
            
            #test-matrix-table tr:not(.dept-header-row) { margin-bottom: 1.25rem; border: 1px solid #e2e8f0 !important; border-radius: 14px; padding: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
            #test-matrix-table td:not(.dept-header-row td) { text-align: left !important; padding: 0.35rem 0.25rem; border: none !important; }
            
            /* Sl No. */
            #test-matrix-table tr:not(.dept-header-row) td:nth-of-type(1) { font-size: 0.75rem; color: #a0aec0; font-weight: 700; padding-bottom: 0; }
            /* Test Name */
            #test-matrix-table tr:not(.dept-header-row) td:nth-of-type(2) { padding-top: 0; margin-bottom: 0.5rem; }
            .test-name-main { font-size: 1.05rem; font-weight: 700 !important; }
            
            /* Status Base */
            #test-matrix-table tr:not(.dept-header-row) td:nth-of-type(3)::before { content: "Status / स्थिति: "; font-weight: 700; color: #718096; font-size: 0.85rem; margin-right: 0.5rem; }
            #test-matrix-table tr:not(.dept-header-row) td:nth-of-type(3) { display: flex; align-items: center; }
            #test-matrix-table tr:not(.dept-header-row) td:nth-of-type(3) .btn { display: inline-flex !important; width: auto !important; padding: 0.3rem 0.8rem !important; }
            
            /* Reason Base */
            #test-matrix-table tr:not(.dept-header-row) td:nth-of-type(4) { border-top: 1px dashed #edf2f7 !important; margin-top: 0.6rem; padding-top: 0.6rem; }
        }
    </style>
</head>
<body>

    <div class="dashboard-header text-center">
        <div class="container">
            <h1 class="fw-bold">उत्तर प्रदेश स्वास्थ्य विभाग</h1>
            <p class="lead mb-1">Live Laboratory Test Availability Status Tracker (Lucknow Division)</p>
            <div class="badge bg-white text-dark fw-bold px-3 py-2 mt-1" id="current-date-badge" style="font-size: 0.95rem;">Date: Loading...</div>
        </div>
    </div>

    <div class="container">
        <div class="control-card">
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label class="form-label fw-bold text-secondary">Select Laboratory Facility / चिकित्सा इकाई का चयन करें</label>
                    <select class="form-select form-select-lg" id="facility-selector" onchange="handleFacilityChange()">
                        <option value="CHC Gosaiganj">CHC Gosaiganj / सी.एच.सी. गोसाईगंज</option>
                        <option value="CHC Kakori">CHC Kakori / सी.एच.सी. काकोरी</option>
                        <option value="CHC Malihabad">CHC Malihabad / सी.एच.सी. मलिहाबाद</option>
                        <option value="CHC Chinhat">CHC Chinhat / सी.एच.सी. चिनहट</option>
                        <option value="CHC Mohanlalganj">CHC Mohanlalganj / सी.एच.सी. मोहनलालगंज</option>
                        <option value="CHC Bakshi Ka Talab">CHC Bakshi Ka Talab / सी.एच.सी. बी.के.टी.</option>
                        <option value="CHC Mal">CHC Mal / सी.एच.सी. माल</option>
                        <option value="CHC Sarojini Nagar">CHC Sarojini Nagar / सी.एच.सी. सरोजनी नगर</option>
                    </select>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label fw-bold text-secondary">Search Diagnostic Test / जांच का नाम खोजें</label>
                    <input type="text" class="form-control form-control-lg" id="search-bar" placeholder="Type test name or shorthand (e.g. TLC, Hb, Sugar)..." onkeyup="filterTestTable()">
                </div>
            </div>
        </div>
    </div>

    <div class="container mb-5">
        <div class="status-card">
            <div class="d-flex justify-content-between align-items-center flex-wrap pb-3 mb-3 border-bottom">
                <h3 class="fw-bold m-0" id="display-facility-name">CHC Gosaiganj</h3>
                <div id="display-status-badge" class="status-badge status-pending">Connecting...</div>
            </div>
            
            <div id="dynamic-content-area">
                </div>
        </div>
    </div>

    <script>
        // 📝 CRITICAL STEP: Paste your deployed Google Apps Script Web App URL exactly between the quotes below:
        const APPS_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbzU38NanE49tWiZMbCcAAd-5RY-7qonBE6YQbYRd32B-9fZeU1mNBjy2QyPvsWtTu6x0g/exec";

        // Structured Master Catalog Grouped Department Wise (Total 73 Tests Mapping)
        const DEPARTMENT_MASTER_CATALOG = {
            "Hematology & Blood Studies / रक्त विज्ञान": [
                "Hemoglobin", "Total leucocyte count", "Differential leucocyte count", "Platelet count", "Complete blood count", "Erythrocyte sedimentation rate (ESR)", "Blood group and Rh typing, cross matching", "Peripheral blood film", "Reticulocyte count", "Absolute eosinophil count", "Bleeding time and clotting time", "Sickle cell screening test", "Sickle cell strip test", "Thalassemia screening", "DCT for Hb electrophoresis", "G6PD enzyme deficiency test", "MP slide method", "Malaria rapid test", "Prothrombin Time (PT) and INR", "Activated partial thromboplastin time (APTT)"
            ],
            "Clinical Pathology (Urine & Stool) / मूत्र एवं मल जांच": [
                "HCG urine test", "Urine routine test", "Urine microscopy", "Urine for microalbumin", "Urine for creatinine and ACR", "Stool for ova and cyst", "Stool for occult blood"
            ],
            "Serology & Microbiology / सीरम विज्ञान और सूक्ष्म जीव विज्ञान": [
                "Dengue test", "RPR/VDRL test", "HIV test", "HBsAg test", "HCV test", "Sputum for AFB", "Typhoid test (IgM)", "Wet mount & Gram stain", "Gram staining", "VIA test", "K39 for Kala Azar", "Filaria test", "TB Mantoux", "Rapid test for cholera", "CBNAAT"
            ],
            "Biochemistry / जैव रसायन": [
                "Blood sugar", "Glucose tolerance test (GTT)", "Total bilirubin", "Direct & indirect bilirubin", "Serum creatinine", "Blood urea", "SGPT", "SGOT", "Alkaline phosphatase", "Total protein", "Albumin & A/G ratio", "Globulin", "Total cholesterol", "Triglycerides", "VLDL", "HDL", "LDL", "Uric acid", "HbA1c", "Serum calcium", "Amylase", "Iron", "TIBC", "LDH", "24 hr urinary protein"
            ],
            "Specialized Diagnostics & Fluids / विशिष्ट जांच": [
                "Troponin I", "CRP (Quantitative)", "Pap smear", "CSF analysis", "Fluid analysis", "Drug overdose test"
            ]
        };

        // Smart Medical Abbreviation Dictionary Mapping
        const ABBREVIATION_MAP = {
            "tlc": "total leucocyte count",
            "dlc": "differential leucocyte count",
            "hb": "hemoglobin",
            "cbc": "complete blood count",
            "esr": "erythrocyte sedimentation rate (esr)",
            "pbf": "peripheral blood film",
            "aec": "absolute eosinophil count",
            "bt": "bleeding time and clotting time",
            "ct": "bleeding time and clotting time",
            "mp": "mp slide method",
            "pt": "prothrombin time (pt) and inr",
            "inr": "prothrombin time (pt) and inr",
            "aptt": "activated partial thromboplastin time (aptt)",
            "hcg": "hcg urine test",
            "acr": "urine for creatinine and acr",
            "afb": "sputum for afb",
            "via": "via test",
            "gtt": "glucose tolerance test (gtt)",
            "sgpt": "sgpt",
            "sgot": "sgot",
            "vldl": "vldl",
            "hdl": "hdl",
            "ldl": "ldl",
            "hba1c": "hba1c",
            "tibc": "tibc",
            "ldh": "ldh",
            "crp": "crp (quantitative)"
        };

        // System Initialization Routines
        document.addEventListener("DOMContentLoaded", function() {
            displayCurrentDate();
            handleFacilityChange(); 
        });

        function displayCurrentDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            document.getElementById("current-date-badge").innerText = "Today's Date: " + today.toLocaleDateString('en-US', options);
        }

        function handleFacilityChange() {
            const selector = document.getElementById("facility-selector");
            const selectedFacility = selector.value;
            const selectedFacilityText = selector.options[selector.selectedIndex].text;
            
            document.getElementById("display-facility-name").innerText = selectedFacilityText;
            fetchLiveStatus(selectedFacility);
        }

        function fetchLiveStatus(facilityId) {
            const badge = document.getElementById("display-status-badge");
            const contentArea = document.getElementById("dynamic-content-area");
            
            document.getElementById("search-bar").value = "";

            badge.className = "status-badge status-pending";
            badge.innerText = "Connecting to Server...";
            contentArea.innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Fetching today's morning log updates...</p>
                </div>`;

            const requestUrl = `${APPS_SCRIPT_API_URL}?facilityId=${encodeURIComponent(facilityId)}`;

            fetch(requestUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.systemStatus === "PENDING") {
                        badge.className = "status-badge status-pending";
                        badge.innerText = "Yet to Update / अपडेशन प्रक्रिया में";
                        contentArea.innerHTML = `
                            <div class="alert alert-warning text-center border-0 py-4 my-2">
                                <h4 class="fw-bold mb-1">⚠️ Updation In Progress / अपडेशन प्रक्रिया में</h4>
                                <p class="mb-0 text-muted">The daily validation tracking log hasn't been submitted by this facility yet today. Please try again later.</p>
                            </div>`;
                    } 
                    else if (data.systemStatus === "UPDATED") {
                        const totalExceptions = Object.keys(data).filter(k => k !== "systemStatus").length;
                        const operationalCount = 73 - totalExceptions;
                        
                        if (totalExceptions === 0) {
                            badge.className = "status-badge status-updated";
                            badge.innerText = "All Tests Active / सभी जांच उपलब्ध";
                        } else {
                            badge.className = "status-badge status-error";
                            badge.innerText = `${totalExceptions} Tests Inactive / जांच बाधित`;
                        }

                        let counterHTML = `
                            <div class="p-3 mb-3 text-center counter-banner shadow-sm d-flex justify-content-around align-items-center flex-wrap">
                                <span>📈 Available Tests / उपलब्ध जांचें: <span class="badge bg-success fs-6 ms-1">${operationalCount} / 73</span></span>
                                <span>⚠️ Inactive Tests / बाधित जांचें: <span class="badge bg-danger fs-6 ms-1">${totalExceptions} / 73</span></span>
                            </div>
                        `;

                        let tableHTML = counterHTML + `
                            <div class="table-responsive">
                                <table class="table table-hover border align-middle" id="test-matrix-table">
                                    <thead class="table-dark">
                                        <tr>
                                            <th style="width: 8%">Sl No.</th>
                                            <th style="width: 52%">Diagnostic Test Panel / जांच का नाम</th>
                                            <th style="width: 18%" class="text-center">Status / स्थिति</th>
                                            <th style="width: 22%" class="text-end">Reason / कारण (If Inactive)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                        `;

                        let absoluteIndex = 1;

                        // Loop through each Department Group
                        for (const [deptName, testList] of Object.entries(DEPARTMENT_MASTER_CATALOG)) {
                            // Inject Row Header for Department name
                            tableHTML += `
                                <tr class="dept-header-row font-weight-bold">
                                    <td colspan="4" class="text-start py-2 px-3 dept-header-cell">${deptName}</td>
                                </tr>
                            `;

                            testList.forEach((test) => {
                                const isDown = data[test];
                                const rowClass = isDown ? "test-row-inactive" : "test-row-active";
                                
                                const statusBadge = isDown ? 
                                    `<div class="btn btn-sm btn-danger px-2 py-1 w-100 disabled text-white border-0" style="opacity:1;">
                                        <span class="status-tag-text">NOT AVAILABLE</span>
                                        <span class="status-tag-text">अनुपलब्ध</span>
                                     </div>` : 
                                    `<div class="btn btn-sm btn-success px-2 py-1 w-100 disabled text-white border-0" style="opacity:1;">
                                        <span class="status-tag-text">AVAILABLE</span>
                                        <span class="status-tag-text">उपलब्ध</span>
                                     </div>`;
                                     
                                let reasonTDContent = "";
                                if (isDown) {
                                    reasonTDContent = `
                                        <span class="mobile-reason-header d-md-none fw-bold text-secondary" style="font-size:0.85rem;">Reason / कारण: </span>
                                        <span class="reason-text-en">${isDown.reasonEn}</span>
                                        <span class="reason-text-hi">${isDown.reasonHi}</span>
                                    `;
                                } else {
                                    reasonTDContent = `<span class="d-none d-md-inline text-muted">-</span>`;
                                }

                                tableHTML += `
                                    <tr class="${rowClass}">
                                        <td>${absoluteIndex++}</td>
                                        <td class="fw-semibold search-target test-name-main">${test}</td>
                                        <td class="text-center">${statusBadge}</td>
                                        <td class="text-end">${reasonTDContent}</td>
                                    </tr>
                                `;
                            });
                        }

                        tableHTML += `</tbody></table></div>`;
                        contentArea.innerHTML = tableHTML;
                    }
                })
                .catch(error => {
                    badge.className = "status-badge status-error";
                    badge.innerText = "Connection Error";
                    contentArea.innerHTML = `
                        <div class="alert alert-danger text-center border-0 py-4">
                            <h4 class="fw-bold">❌ Connection Timeout</h4>
                            <p class="mb-0">Unable to link with health servers. Please verify deployment link parameters or check back later.</p>
                        </div>`;
                });
        }

        // Real-time Smart Text Filter Match Matrix Engine
        function filterTestTable() {
            let query = document.getElementById("search-bar").value.toLowerCase().trim();
            const table = document.getElementById("test-matrix-table");
            if (!table) return; 
            
            if (ABBREVIATION_MAP[query]) {
                query = ABBREVIATION_MAP[query];
            }
            
            const rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");
            let currentDeptHeader = null;
            let visibleTestsInDept = 0;

            // Iterate over all rows (including department group rows)
            for (let i = 0; i < rows.length; i++) {
                if (rows[i].classList.contains("dept-header-row")) {
                    // If we reach a new department header, manage the previous one first
                    if (currentDeptHeader) {
                        currentDeptHeader.style.display = (visibleTestsInDept > 0) ? "" : "none";
                    }
                    currentDeptHeader = rows[i];
                    visibleTestsInDept = 0; // reset counter for new section
                    continue;
                }

                const testNameCell = rows[i].querySelector(".search-target");
                if (testNameCell) {
                    const textValue = (testNameCell.textContent || testNameCell.innerText).toLowerCase();
                    
                    if (textValue.indexOf(query) > -1) {
                        rows[i].style.display = "";
                        visibleTestsInDept++;
                    } else {
                        rows[i].style.display = "none";
                    }
                }
            }

            // Clean loop handling for the final department group header block left over
            if (currentDeptHeader) {
                currentDeptHeader.style.display = (visibleTestsInDept > 0 || query === "") ? "" : "none";
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
